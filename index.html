<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    
    <!-- iOS PWA Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Limpia la pieza" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <title>Limpia la pieza de Ceci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body, #root {
        width: 100%;
        height: 100%;
        height: 100dvh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #1a1a1a;
        user-select: none;
        -webkit-user-select: none; /* Safari specific */
        font-family: 'Fredoka', sans-serif;
        
        /* Prevent elastic scrolling/bouncing on iOS */
        overscroll-behavior: none;
        touch-action: none;
      }
      
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 4px rgba(0,0,0,0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 10;
      }
      #crosshair::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 4px;
        background: white;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
    <link rel="stylesheet" href="/index.css">
    <script type="module" crossorigin src="./assets/index-DoxHlAe2.js"></script>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; font-family: 'Fredoka', sans-serif;">
        <div style="width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.2); border-top-color: #ff9aa2; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <h2 style="margin: 0 0 10px 0; font-size: 24px; letter-spacing: 1px;">Cargando el juego...</h2>
        <p style="margin: 0; color: #aaa; font-size: 16px; animation: pulse 1.5s ease-in-out infinite;">Preparando el desorden de Ceci</p>
      </div>
    </div>
  </body>
</html>
